data_dir: "data"

boards:
  - board_id: "board-1"
    com_port: "/dev/cu.wchusbserial10"
    sensors_in_use: 10           # 1..16
    sensor_settings:
      gain: 2                    # 1,2,4,8
      atime: 30                  # 0..255
      astep: 600                 # 0..65535
    sample_type: "liquid"        # "solid" or "liquid" (solid => LEDs_ON true)
    control_voltage: 5.0         # 0..10, applied only during run()

  - board_id: "board-2"
    com_port: "/dev/cu.wchusbserial11"
    sensors_in_use: 16
    sensor_settings:
      gain: 4
      atime: 20
      astep: 800
    sample_type: "solid"
    control_voltage: 0.0
