data_dir: "data"

# ── Spectral sensing boards (serial connection to ESP32 PCBs) ─────────────────
boards:
  - board_id: "board-1"
    com_port: "/dev/cu.wchusbserial10"
    sensors_in_use: 16           # 1..16
    sensor_settings:
      gain: 32                    # 1,2,4,8
      atime: 255                  # 0..255
      astep: 600                  # 0..65535
    sample_type: "liquid"        # "solid" or "liquid" (solid => LEDs_ON true)
    control_voltage: 9.0         # 0..10, applied only during run()
    target_temp_c: null          # float e.g. 37.0 enables firmware PID; null = heaters off

# ── N9 Robot ──────────────────────────────────────────────────────────────────
robot:
  simulate: true                 # true = log moves only, no hardware calls
  safe_travel_z_mm: 80.0         # Z height used for all XY travel moves

# ── Liquid dispenser (hardware TBD) ───────────────────────────────────────────
# Replace this section once dispenser hardware is defined.
dispenser:
  simulate: true                 # true = log actions only; non-simulate raises NotImplementedError
  volume_per_dispense_ul: 50.0   # placeholder dispensed volume per well

# ── PCB sensing boards in the robot workspace ─────────────────────────────────
# Each PCB has a 2-column × 8-row grid of sensor wells (16 total).
# Sensor numbering: odd (1,3,...,15) → col 0; even (2,4,...,16) → col 1.
# origin_xyz: robot coords (mm) of well (col=0, row=0) = sensor 1.
# Add one entry per physical PCB installed in the workspace.
pcb_boards:
  - pcb_id: "pcb-1"
    board_id: "board-1"          # cross-reference to boards[] entry above
    origin_xyz: [100.0, 50.0, 5.0]
    col_spacing_mm: 30.0         # spacing between the 2 columns
    row_spacing_mm: 15.0         # spacing between the 8 rows
    pick_z_mm: 2.0               # Z (mm) to descend to for pick/place on this PCB
    dispense_z_mm: 8.0           # Z (mm) for dispenser nozzle above sensor well

# ── Sample holders ────────────────────────────────────────────────────────────
# Each holder has a 5-column × 18-row grid (90 slots total).
# origin_xyz: robot coords (mm) of slot (col=0, row=0).
# Add one entry per physical holder installed in the workspace.
sample_holders:
  - holder_id: "holder-1"
    origin_xyz: [300.0, 50.0, 5.0]
    col_spacing_mm: 11.5         # spacing between the 5 columns
    row_spacing_mm: 5.75         # spacing between the 18 rows
    n_cols: 5
    n_rows: 18
    pick_z_mm: 2.0               # Z (mm) to descend to for pick/place

# ── Test cell ─────────────────────────────────────────────────────────────────
# Single-sample electrochemical station. Holds one sample at a time.
test_cell:
  position_xyz: [450.0, 200.0, 5.0]
  pick_z_mm: 2.0                 # Z (mm) to descend to for pick/place
  safe_z_mm: 30.0                # Z (mm) clearance above test cell during approach
